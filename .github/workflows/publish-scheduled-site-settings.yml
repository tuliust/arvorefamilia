name: Publicar configurações públicas agendadas

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  publish-scheduled-site-settings:
    name: Executar publicações visuais vencidas
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Chamar Edge Function de publicação
        env:
          SITE_SETTINGS_PUBLISH_URL: ${{ secrets.SITE_SETTINGS_PUBLISH_URL }}
          SITE_SETTINGS_CRON_SECRET: ${{ secrets.SITE_SETTINGS_CRON_SECRET }}
        run: |
          if [ -z "$SITE_SETTINGS_PUBLISH_URL" ]; then
            echo "SITE_SETTINGS_PUBLISH_URL não configurado."
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "content-type: application/json" \
            --header "x-cron-secret: ${SITE_SETTINGS_CRON_SECRET}" \
            --data '{}' \
            "$SITE_SETTINGS_PUBLISH_URL"
